name: Careeright Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared UI
        run: pnpm --filter @repo/ui check-types

      - name: Typecheck desktop
        run: pnpm --filter @careeright/desktop check-types

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-manual-{0}', github.run_number) }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Careeright Desktop {0}', github.ref_name) || format('Careeright Desktop manual build {0}', github.run_number) }}
          releaseBody: |
            Careeright Desktop installers for Windows, macOS, and Linux.

            Windows users should download the `.exe` or `.msi`.
            macOS users should download the `.dmg`.
            Linux users should download the `.AppImage` or `.deb`.
          releaseDraft: true
          prerelease: false
