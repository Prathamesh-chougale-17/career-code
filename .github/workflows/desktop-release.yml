name: Careeright Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate desktop version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^desktop-v/, "");
          const packageVersion = require("./apps/desktop/package.json").version;
          const tauriConfig = JSON.parse(
            fs.readFileSync("./apps/desktop/src-tauri/tauri.conf.json", "utf8"),
          );
          const cargoToml = fs.readFileSync(
            "./apps/desktop/src-tauri/Cargo.toml",
            "utf8",
          );
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          const versions = {
            "apps/desktop/package.json": packageVersion,
            "apps/desktop/src-tauri/tauri.conf.json": tauriConfig.version,
            "apps/desktop/src-tauri/Cargo.toml": cargoVersion,
          };
          const mismatches = Object.entries(versions).filter(
            ([, version]) => version !== tagVersion,
          );

          if (mismatches.length > 0) {
            console.error(`Desktop tag ${process.env.GITHUB_REF_NAME} expects version ${tagVersion}.`);
            for (const [file, version] of mismatches) {
              console.error(`- ${file} is ${version}`);
            }
            process.exit(1);
          }
          NODE

      - name: Build shared workspace packages
        run: |
          pnpm --filter @careeright/db build
          pnpm --filter @careeright/domain build
          pnpm --filter @careeright/api build

      - name: Typecheck shared UI
        run: pnpm --filter @repo/ui check-types

      - name: Typecheck desktop
        run: pnpm --filter @careeright/desktop check-types

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-manual-{0}', github.run_number) }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Careeright Desktop {0}', github.ref_name) || format('Careeright Desktop manual build {0}', github.run_number) }}
          releaseBody: |
            Careeright Desktop installers for Windows, macOS, and Linux.

            Windows users should download the `.exe` or `.msi`.
            macOS users should download the `.dmg`.
            Linux users should download the `.AppImage` or `.deb`.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
