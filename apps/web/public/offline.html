<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#84cc16" />
    <title>Career Code is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #ffffff;
        color: #17171b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 420px;
        display: grid;
        gap: 14px;
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        margin: 0 auto;
        border-radius: 18px;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #5b6472;
        line-height: 1.6;
      }

      a {
        width: fit-content;
        margin: 10px auto 0;
        border-radius: 10px;
        background: #84cc16;
        color: #111315;
        padding: 10px 16px;
        font-weight: 700;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #17171b;
          color: #f7fee7;
        }

        p {
          color: #b8c0cc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/career-code-logo.png" alt="" />
      <h1>Career Code is offline</h1>
      <p>
        Your workspace needs a network connection for live board, auth, MCP, and
        proposal data. Reconnect and try again.
      </p>
      <a href="/">Retry</a>
    </main>
  </body>
</html>
